<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
<script src="../js/animations.js"></script>
<script>
    async function startMatching() {
        const jobTitle = document.getElementById("jobTitle").value.trim();
        const jobDescription = document.getElementById("jobDescription").value.trim();
        const resumeFiles = document.getElementById("resumeFiles").files;

        if (!jobTitle) { showToast("Please enter a job title.", "error"); return; }
        if (!jobDescription) { showToast("Please enter a job description.", "error"); return; }
        if (resumeFiles.length === 0) { showToast("Please upload at least one resume.", "error"); return; }

        document.getElementById("loading").style.display = "block";

        const formData = new FormData();
        formData.append("job_title", jobTitle);
        formData.append("job_description", jobDescription);
        for (let file of resumeFiles) {
            formData.append("resumes", file);
        }

        try {
            const response = await fetch("http://127.0.0.1:8000/api/match/rank", {
                method: "POST",
                body: formData
            });

            if (!response.ok) throw new Error("Server error. Please try again.");

            const results = await response.json();

            // Save to history
            const history = JSON.parse(localStorage.getItem("jobHistory") || "[]");
            history.push({
                title: jobTitle,
                date: new Date().toLocaleDateString(),
                totalCandidates: results.length,
                strongMatches: results.filter(r => r.status === "Strong Match").length,
                results: results
            });
            localStorage.setItem("jobHistory", JSON.stringify(history));

            // Save current results and redirect
            localStorage.setItem("matchResults", JSON.stringify(results));
            localStorage.setItem("jobTitle", jobTitle);
            window.location.href = "results.html";

        } catch (err) {
            document.getElementById("loading").style.display = "none";
            showToast(err.message, "error");
        }
    }
    requireAuth("recruiter", "login.html");
</script>
