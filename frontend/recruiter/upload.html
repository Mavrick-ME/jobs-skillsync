<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload | Jobs SkillSync</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav>
        <div class="logo">⚡ Jobs SkillSync</div>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>📋 Job Description</h2>
            <label>Job Title</label>
            <input type="text" id="jobTitle" placeholder="e.g. Python Developer">
            <label>Job Description</label>
            <textarea id="jobDescription" placeholder="Paste the full job description here..."></textarea>
        </div>

        <div class="card">
            <h2>📄 Upload Resumes</h2>
            <label>Select resume files (PDF, DOCX, TXT — multiple allowed)</label>
            <input type="file" id="resumeFiles" multiple accept=".pdf,.docx,.txt">
            <br>
            <button onclick="startMatching()">🚀 Match Candidates</button>
        </div>

        <div id="loading" style="display:none; text-align:center; padding:2rem;">
            <p style="color:#38bdf8; font-size:1.1rem;">⏳ Analyzing resumes... please wait</p>
        </div>

        <div id="error" style="display:none;" class="card">
            <p style="color:#f87171;" id="errorMsg"></p>
        </div>
    </div>

    <script>
        async function startMatching() {
            const jobTitle = document.getElementById("jobTitle").value.trim();
            const jobDescription = document.getElementById("jobDescription").value.trim();
            const resumeFiles = document.getElementById("resumeFiles").files;

            // Validation
            if (!jobTitle) { showError("Please enter a job title."); return; }
            if (!jobDescription) { showError("Please enter a job description."); return; }
            if (resumeFiles.length === 0) { showError("Please upload at least one resume."); return; }

            showLoading(true);

            const formData = new FormData();
            formData.append("job_title", jobTitle);
            formData.append("job_description", jobDescription);
            for (let file of resumeFiles) {
                formData.append("resumes", file);
            }

            try {
                const response = await fetch("http://127.0.0.1:8000/api/match/rank", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) throw new Error("Server error. Please try again.");

                const results = await response.json();

                // Save results and redirect to results page
                localStorage.setItem("matchResults", JSON.stringify(results));
                localStorage.setItem("jobTitle", jobTitle);
                window.location.href = "results.html";

            } catch (err) {
                showLoading(false);
                showError(err.message);
            }
        }

        function showLoading(show) {
            document.getElementById("loading").style.display = show ? "block" : "none";
        }

        function showError(msg) {
            const el = document.getElementById("error");
            document.getElementById("errorMsg").textContent = msg;
            el.style.display = "block";
        }
    </script>
</body>
</html>
