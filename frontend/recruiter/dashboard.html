<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Dashboard | Jobs SkillSync</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 1.8rem;
            text-align: center;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            border-color: rgba(56, 189, 248, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(56, 189, 248, 0.08);
        }
        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #38bdf8;
        }
        .stat-card .label {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }
        .job-list { display: flex; flex-direction: column; gap: 1rem; }
        .job-item {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .job-item:hover {
            border-color: rgba(56, 189, 248, 0.3);
            transform: translateX(4px);
        }
        .job-item-left h3 { color: #f1f5f9; font-size: 1rem; margin-bottom: 0.3rem; }
        .job-item-left p { color: #64748b; font-size: 0.83rem; }
        .job-item-right { display: flex; align-items: center; gap: 1rem; }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #64748b;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
        .empty-state p { margin-bottom: 1.5rem; line-height: 1.6; }
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            height: 70px;
            margin-bottom: 1rem;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div id="tsparticles"></div>

    <nav class="page-nav">
        <div class="logo">⚡ Jobs SkillSync</div>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="upload.html">New Match</a>
            <a href="../admin/dashboard.html">Admin</a>
            <a href="#" onclick="logout(); window.location.href='login.html'" style="color:#f87171;">Logout</a>
        </div>
    </nav>

    <div class="container" style="max-width:1000px; padding-top:2rem;">

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
            <div>
                <h1 style="color:#f1f5f9; font-size:1.8rem; font-weight:800;">
                    Recruiter Dashboard
                </h1>
                <p style="color:#64748b; margin-top:0.3rem;" id="welcomeMsg">
                    Welcome back!
                </p>
            </div>
            <a href="upload.html" class="btn-primary">+ New Match</a>
        </div>

        <!-- Stats -->
        <div class="dashboard-grid">
            <div class="stat-card">
                <div class="number" id="totalJobs">—</div>
                <div class="label">Jobs Posted</div>
            </div>
            <div class="stat-card">
                <div class="number" id="totalResumes">—</div>
                <div class="label">Resumes Screened</div>
            </div>
            <div class="stat-card">
                <div class="number" id="strongMatches">—</div>
                <div class="label">Strong Matches Found</div>
            </div>
        </div>

        <!-- Job History -->
        <div class="card">
            <h2 style="margin-bottom:1.5rem;">📋 Recent Jobs</h2>
            <div class="job-list" id="jobList">
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <script>
        requireAuth("recruiter", "login.html");

        // Show username
        document.getElementById("welcomeMsg").textContent =
            `Welcome back, ${getUser()}!`;

        window.addEventListener("load", () => {
            tsParticles.load("tsparticles", {
                particles: {
                    number: { value: 40 },
                    color: { value: ["#38bdf8", "#818cf8"] },
                    links: { enable: true, color: "#1e293b", opacity: 0.4 },
                    move: { enable: true, speed: 0.6 },
                    opacity: { value: 0.4 },
                    size: { value: { min: 1, max: 2 } }
                },
                interactivity: {
                    events: { onHover: { enable: true, mode: "repulse" } }
                },
                background: { color: "transparent" }
            });
        });

        // Load history from API
        async function loadHistory() {
            try {
                const res = await fetch("http://127.0.0.1:8000/api/match/history");
                const history = await res.json();

                const totalResumes = history.reduce((s, j) => s + j.total_candidates, 0);
                const strongMatches = history.reduce((s, j) => s + j.strong_matches, 0);

                document.getElementById("totalJobs").textContent = history.length;
                document.getElementById("totalResumes").textContent = totalResumes;
                document.getElementById("strongMatches").textContent = strongMatches;

                const jobList = document.getElementById("jobList");

                if (history.length === 0) {
                    jobList.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>No jobs matched yet.<br>Start by uploading resumes!</p>
                            <a href="upload.html" class="btn-primary">Start Matching →</a>
                        </div>
                    `;
                    return;
                }

                jobList.innerHTML = "";
                history.forEach(job => {
                    jobList.innerHTML += `
                        <div class="job-item" onclick="viewResults(${job.id}, '${job.title}')">
                            <div class="job-item-left">
                                <h3>${job.title}</h3>
                                <p>${job.date} &nbsp;·&nbsp; ${job.total_candidates} candidates screened</p>
                            </div>
                            <div class="job-item-right">
                                <span class="badge-strong">${job.strong_matches} Strong</span>
                                <span style="color:#64748b; font-size:1.2rem;">›</span>
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                document.getElementById("jobList").innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>Could not connect to server.<br>Make sure the backend is running.</p>
                    </div>
                `;
            }
        }

        async function viewResults(jobId, title) {
            try {
                const res = await fetch(`http://127.0.0.1:8000/api/match/history/${jobId}`);
                const data = await res.json();
                localStorage.setItem("matchResults", JSON.stringify(data.results));
                localStorage.setItem("jobTitle", title);
                window.location.href = "results.html";
            } catch (err) {
                showToast("Could not load results", "error");
            }
        }

        loadHistory();
    </script>
</body>
</html>
