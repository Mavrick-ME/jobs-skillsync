<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Dashboard | Jobs SkillSync</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 1.8rem;
            text-align: center;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            border-color: rgba(56, 189, 248, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(56, 189, 248, 0.08);
        }
        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #38bdf8;
        }
        .stat-card .label {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }
        .job-list { display: flex; flex-direction: column; gap: 1rem; }
        .job-item {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .job-item:hover {
            border-color: rgba(56, 189, 248, 0.3);
            transform: translateX(4px);
        }
        .job-item-left h3 { color: #f1f5f9; font-size: 1rem; margin-bottom: 0.3rem; }
        .job-item-left p { color: #64748b; font-size: 0.83rem; }
        .job-item-right { display: flex; align-items: center; gap: 1rem; }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #64748b;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
        .empty-state p { margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div id="tsparticles"></div>

    <nav class="page-nav">
        <div class="logo">⚡ Jobs SkillSync</div>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="upload.html">New Match</a>
            <a href="../admin/dashboard.html">Admin</a>
            <a href="#" onclick="logout(); window.location.href='login.html'" style="color:#f87171;">Logout</a>
        </div>
    </nav>

    <div class="container" style="max-width:1000px; padding-top:2rem;">

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
            <div>
                <h1 style="color:#f1f5f9; font-size:1.8rem; font-weight:800;">Recruiter Dashboard</h1>
                <p style="color:#64748b; margin-top:0.3rem;">Overview of all your job matching sessions</p>
            </div>
            <a href="upload.html" class="btn-primary">+ New Match</a>
        </div>

        <!-- Stats -->
        <div class="dashboard-grid">
            <div class="stat-card">
                <div class="number" id="totalJobs">0</div>
                <div class="label">Jobs Posted</div>
            </div>
            <div class="stat-card">
                <div class="number" id="totalResumes">0</div>
                <div class="label">Resumes Screened</div>
            </div>
            <div class="stat-card">
                <div class="number" id="strongMatches">0</div>
                <div class="label">Strong Matches Found</div>
            </div>
        </div>

        <!-- Job History -->
        <div class="card">
            <h2 style="margin-bottom:1.5rem;">📋 Recent Jobs</h2>
            <div class="job-list" id="jobList">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>No jobs matched yet.<br>Start by uploading resumes!</p>
                    <a href="upload.html" class="btn-primary">Start Matching →</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/animations.js"></script>
    <script>
        // Load history from localStorage
        const history = JSON.parse(localStorage.getItem("jobHistory") || "[]");

        // Update stats
        const totalResumes = history.reduce((sum, j) => sum + (j.totalCandidates || 0), 0);
        const strongMatches = history.reduce((sum, j) => sum + (j.strongMatches || 0), 0);

        document.getElementById("totalJobs").textContent = history.length;
        document.getElementById("totalResumes").textContent = totalResumes;
        document.getElementById("strongMatches").textContent = strongMatches;

        // Render job list
        if (history.length > 0) {
            const jobList = document.getElementById("jobList");
            jobList.innerHTML = "";
            history.reverse().forEach((job, i) => {
                jobList.innerHTML += `
                    <div class="job-item" onclick="viewResults(${i})">
                        <div class="job-item-left">
                            <h3>${job.title}</h3>
                            <p>${job.date} &nbsp;·&nbsp; ${job.totalCandidates} candidates screened</p>
                        </div>
                        <div class="job-item-right">
                            <span class="badge-strong">${job.strongMatches} Strong</span>
                            <span style="color:#64748b; font-size:1.2rem;">›</span>
                        </div>
                    </div>
                `;
            });
        }

        function viewResults(index) {
            const job = history[index];
            localStorage.setItem("matchResults", JSON.stringify(job.results));
            localStorage.setItem("jobTitle", job.title);
            window.location.href = "results.html";
        }
        requireAuth("recruiter", "login.html");
    </script>
</body>
</html>
